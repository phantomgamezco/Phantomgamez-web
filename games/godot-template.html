<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Godot Game Player</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #0a0e18;
        display: grid;
        place-items: center;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        color: white;
      }
      .container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        display: block;
        max-width: 100%;
        max-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <canvas id="canvas"></canvas>
    </div>

    <!-- 
      To use this with a Godot HTML5 export:
      1. Replace this file with the actual Godot export files (HTML, JS, WASM)
      2. Make sure the export includes the game canvas and script loader
      3. You can unzip your Godot export into a folder like: games/your-game/
      4. Link to this file from your shop items
    -->
    
    <script>
      // This is a placeholder. Replace with your actual Godot game files.
      document.body.innerHTML = `
        <div style="text-align: center; padding: 20px;">
          <h1>Game Player Ready</h1>
          <p>Replace this file with your Godot HTML5 export.</p>
          <p style="font-size: 0.9rem; color: #8fa2c7;">
            Extract your Godot .zip export into a folder and replace this HTML with the export's index.html
          </p>
        </div>
      `;
    </script>
  </body>
</html>
